server_id = "mcp_inventory"
display_name = "Inventory"
version = "1.3.0"
domain = "inventory"
sdk_version = "0.1.0"
risk_level = "medium"
writes_allowed = "gated"
transports = ["stdio"]
credentials = []
governance_gates = ["stock_movement_audit"]
environments = ["development", "staging", "production"]

[[tools]]
name = "item_upsert"
description = "Add/update inventory item"
risk_class = "internal_write"
requires_approval = false
credential_bindings = []

[[tools]]
name = "item_list"
description = "List inventory items"
risk_class = "read_only"
requires_approval = false
credential_bindings = []

[[tools]]
name = "location_create"
description = "Create warehouse/bin location"
risk_class = "internal_write"
requires_approval = false
credential_bindings = []

[[tools]]
name = "location_list"
description = "List locations"
risk_class = "read_only"
requires_approval = false
credential_bindings = []

[[tools]]
name = "stock_receive"
description = "Receive stock into location"
risk_class = "internal_write"
requires_approval = false
credential_bindings = []

[[tools]]
name = "stock_issue"
description = "Issue stock from location"
risk_class = "internal_write"
requires_approval = false
credential_bindings = []

[[tools]]
name = "stock_transfer"
description = "Transfer between locations"
risk_class = "internal_write"
requires_approval = false
credential_bindings = []

[[tools]]
name = "stock_adjust"
description = "Adjust stock (cycle count)"
risk_class = "internal_write"
